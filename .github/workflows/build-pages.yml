name: Build Dashboard Pages

on:
  workflow_dispatch:
  push:
    paths:
      - "data/raw/**"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate
        run: python scripts/validate_data.py

      - name: Build data
        run: python scripts/build_dashboard_data.py

      - name: Generate pages
        run: python scripts/generate_pages.py

      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add .
          git commit -m "update dashboard" || echo "no changes"
          git push